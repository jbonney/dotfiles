matches:
  - trigger: ":volunteer"
    form: |-
      Hej,

      [[date]] har vi hemma match i [[location]]. Som vi kommunicerade tidigare så bestämmer vi vilka som tar ansvar för kiosken och som blir matchvärd / funktionär. 

      Kiosk: [[kiosk]]
      Matchvärd: [[host]]

      Om ni inte kan vara med, ta kontakt med andra föräldrar i laget så att ni byter mellan varandra. Bara informera mig i så fall så att jag uppdaterar på min sida. 

      Mer information om matchvärd ansvar och schyssmatch finns här (https://www.handbollsyd.se/hf-syd/forening/schysstmatch). Tänk också att ta med papper och penna för att kunna ha lappar till omklädningsrum med lag namn osv. 

      All information relaterat till kiosken får ni från Oves mamma (Emma) i föräldrachat på Signal. Notera att vi också behöver någon som kan ta över från henne nästa säsong så hör av er om det skulle passa er. 

      Hör av er om ni har frågor och ni som är ansvariga svara gärna på det här mejlet för att bekräfta att ni har fått information!

      Tack på förhand för hjälpen!

      Jimmy
